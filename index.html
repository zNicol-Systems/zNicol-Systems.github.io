<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<title>zNicol Bot</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: #1e1f22;
  overflow-x: hidden;
}

/* VIDEO FONDO */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* OSCURECER FONDO */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  top: 0;
  left: 0;
  z-index: -1;
}

/* PARTICULAS */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: #ff7ac6;
  border-radius: 50%;
  opacity: 0.5;
  animation: floatUp linear infinite;
  z-index: -1;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* FLORES */
.flower {
  position: fixed;
  top: -10vh;
  font-size: 18px;
  opacity: 0.8;
  animation: fall linear infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* CONTENEDOR */
.container {
  text-align: center;
  padding: 50px 20px;
  position: relative;
  z-index: 1;
  animation: fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* LOGO */
.logo {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover; 
  margin-bottom: 15px;
  border: 3px solid #ff7ac6;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

h1 {
  font-size: 40px;
  margin: 10px 0;
}

p {
  color: #b5bac1;
}

/* BOTONES */
.btn {
  background: linear-gradient(135deg, #ff7ac6, #ffb3e6);
  color: white;
  padding: 12px 25px;
  margin: 5px;
  border-radius: 12px;
  text-decoration: none;
  display: inline-block;
}

/* REDES */
.socials {
  text-align: center;
  margin-top: 60px;
}

.socials a {
  display: inline-block;
  margin: 5px 10px;
  padding: 10px 15px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: linear-gradient(135deg, #ff7ac6, #ffb3e6);
}

/* 🌸 EMOJIS PERSONALIZADOS */
.emoji {
  width: 18px;
  height: 18px;
  vertical-align: middle;
  margin: 0 2px;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop id="bg-video">
<source src="2.mp4" type="video/mp4">
</video>

<!-- 🌌 PARTICULAS -->
<script>
for (let i = 0; i < 25; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(p);
}
</script>

<!-- 🌸 FLORES -->
<script>
const flowers = ["🌸","🌷","💮","🌺"];

for (let i = 0; i < 20; i++) {
  let f = document.createElement("div");
  f.className = "flower";
  f.innerText = flowers[Math.floor(Math.random()*flowers.length)];
  f.style.left = Math.random() * 100 + "vw";
  f.style.animationDuration = (5 + Math.random() * 5) + "s";
  document.body.appendChild(f);
}
</script>

<div class="container">

<video class="logo" autoplay muted loop>
  <source src="1.mp4" type="video/mp4">
</video>

<h1>
  <img class="emoji" src="https://cdn.discordapp.com/emojis/1494238180143140904.png">
  zNicol System's
</h1>

<p>
  💖 La bot perfecta para gestionar tu servidor de Discord ✨
</p>

<div class="buttons">
  <a class="btn" href="#">Invitar</a>
  <a class="btn" href="#">Soporte</a>
</div>

<div class="section">
  <h2>
    <img class="emoji" src="https://cdn.discordapp.com/emojis/1494234293692796948.png">
    Información
  </h2>

  <div class="card">

<h3>
  <img class="emoji" src="https://cdn.discordapp.com/emojis/1495657566733078569.png">
  Hola, soy zNicol
</h3>

<p>
  💖 Hiiiii~ soy <b>zNicol</b> 💕
</p>

<p><b>
  <img class="emoji" src="https://cdn.discordapp.com/emojis/1494243427167109153.png">
  ¿Qué puedo hacer?
</b></p>

<p>⚙️ Sistemas avanzados</p>
<p>🛡️ Moderación</p>
<p>🎀 Comandos</p>

<p><b>
  <img class="emoji" src="https://cdn.discordapp.com/emojis/1495653245098393600.png">
  Cómo usarme:
</b></p>

<p>• Prefix: zNicol</p>
<p>• Slash: /help</p>

<p>
  💜 <b>zNicol</b> — Tu bot digital ✨
</p>

  </div>
</div>

</div>

</body>
</html>
