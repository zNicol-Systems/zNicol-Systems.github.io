<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: #1e1f22;
  overflow-x: hidden;
}

/* VIDEO FONDO */
#bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -2;
}

/* OSCURECER FONDO */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
  top: 0;
  left: 0;
  z-index: -1;
}

/* PARTICULAS */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: #ff7ac6;
  border-radius: 50%;
  opacity: 0.5;
  animation: floatUp linear infinite;
  z-index: -1;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* FLORES */
.flower {
  position: fixed;
  top: -10vh;
  font-size: 18px;
  opacity: 0.8;
  animation: fall linear infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
}

/* CONTENEDOR */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 50px 20px;
  position: relative;
  z-index: 1;
}

/* LOGO */
.logo {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ff7ac6;
  animation: float 3s ease-in-out infinite;
  margin-bottom: 15px;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* TITULO */
h1 {
  font-size: 40px;
  margin: 10px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

h1 img {
  width: 40px;
  height: 40px;
}

/* CARD */
.card {
  background: rgba(49,51,56,0.85);
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 500px;
  backdrop-filter: blur(5px);
  text-align: left;
}

/* PRESENTACION CUTE */
.presentation {
  margin-top: 15px;
  padding: 15px;
  border-radius: 15px;
  background: rgba(255,122,198,0.12);
  border: 1px solid rgba(255,122,198,0.45);
  box-shadow: 0 0 15px rgba(255,122,198,0.25);
}

.presentation h2 {
  margin-top: 0;
  color: #ffb3e6;
  text-align: center;
}

.presentation p {
  line-height: 1.5;
}

/* BOTONES */
.buttons {
  margin: 15px 0;
}

.btn {
  background: linear-gradient(135deg, #ff7ac6, #ffb3e6);
  color: white;
  padding: 12px 25px;
  margin: 5px;
  border-radius: 12px;
  text-decoration: none;
  display: inline-block;
}

/* REDES */
.socials {
  text-align: center;
  margin-top: 40px;
}

.socials a {
  display: inline-block;
  margin: 5px 10px;
  padding: 10px 15px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  background: linear-gradient(135deg, #ff7ac6, #ffb3e6);
}

/* CONTADOR */
.visit-counter {
  text-align: center;
  margin-top: 30px;
  margin-bottom: 30px;
}
