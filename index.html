<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invita mi bot</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2b2d31, #1e1f22);
      font-family: Arial, sans-serif;
      color: white;
    }

    .card {
      background: #313338;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      width: 350px;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0;
      font-size: 28px;
    }

    p {
      color: #b5bac1;
      margin-bottom: 25px;
    }

    .btn {
      background: #5865F2;
      color: white;
      padding: 12px 25px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
      display: inline-block;
      transition: 0.2s;
    }

    .btn:hover {
      background: #4752c4;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="card">

  <!-- 🔥 Puedes poner logo aquí -->
  <img class="logo" src="https://i.imgur.com/TxTglLI.png">

  <h1>zNicol Bot 🤖</h1>
  <p>Invita el bot a tu servidor y mejora tu comunidad</p>

  <a class="btn" href="https://discord.com/oauth2/authorize?client_id=1395515437885952151&scope=bot%20applications.commands&permissions=8">
    Invitar Bot
  </a>

</div>

</body>
</html>
